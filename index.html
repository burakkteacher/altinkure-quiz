<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<title>Altınküre Vocabulary Quiz</title>

<style>
body{
font-family: Arial, sans-serif;
background:#f4f6f8;
margin:0;
}

header{
background:#1f3a5f;
color:white;
padding:15px;
display:flex;
align-items:center;
gap:15px;
}

header img{
height:50px;
}

header h1{
font-size:18px;
margin:0;
}

.container{
display:grid;
grid-template-columns:320px 1fr;
gap:20px;
padding:20px;
}

.card{
background:white;
padding:15px;
border-radius:8px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
margin-bottom:15px;
}

.card h3{
margin-top:0;
}

button{
background:#1f3a5f;
color:white;
border:none;
padding:10px 15px;
border-radius:5px;
cursor:pointer;
margin-top:5px;
}

button:hover{
background:#2d5285;
}

textarea{
width:100%;
height:120px;
}

#quizOutput{
background:white;
padding:20px;
border-radius:8px;
}

.quizPage{
page-break-after:always;
margin-bottom:30px;
}

.quizHeader{
border-bottom:2px solid #000;
margin-bottom:15px;
padding-bottom:10px;
}

.question{
margin:10px 0;
}

.studentItem{
margin-bottom:5px;
}

.unitList{
max-height:120px;
overflow:auto;
border:1px solid #ddd;
padding:5px;
}

@media print{

body{background:white;}
.container{display:block;}
.card{display:none;}
header{display:none;}

}
</style>

</head>

<body>

<header>
<img src="logo.png">
<h1>ALTINKÜRE YABANCI DİLLER KOORDİNATÖRLÜĞÜ</h1>
</header>

<div class="container">

<div>

<div class="card">
<h3>Sınıf</h3>
<select id="grade">
<option value="5">5</option>
<option value="6">6</option>
<option value="7">7</option>
<option value="8">8</option>
</select>
</div>

<div class="card">
<h3>Öğrenciler</h3>
<div id="studentList"></div>
</div>

<div class="card">
<h3>Level</h3>
<label><input type="checkbox" value="Pre-A1" class="level"> Pre-A1</label><br>
<label><input type="checkbox" value="A1" class="level"> A1</label><br>
<label><input type="checkbox" value="A2" class="level"> A2</label><br>
<label><input type="checkbox" value="B1" class="level"> B1</label><br>
<label><input type="checkbox" value="B2" class="level"> B2</label>
</div>

<div class="card">
<h3>Üniteler</h3>
<div id="unitList" class="unitList"></div>
</div>

<div class="card">
<h3>Manuel Kelime</h3>
<textarea id="manualWords" placeholder="apple	elma"></textarea>
</div>

<div class="card">
<h3>Quiz Ayarı</h3>

<select id="questionCount">
<option value="10">10</option>
<option value="15">15</option>
<option value="20">20</option>
<option value="25">25</option>
</select>

<br>

<label>
<input type="checkbox" id="preventRepeat" checked>
Öğrenci için tekrar etmesin
</label>

<br>

<button onclick="createQuiz()">QUIZ OLUŞTUR</button>
<button onclick="window.print()">YAZDIR</button>

</div>

</div>

<div id="quizOutput"></div>

</div>

<script>

let students=[]
let words=[]

fetch("students.json")
.then(r=>r.json())
.then(data=>{
students=data
loadStudents()
})

function getSelectedLevels(){
  // If none checked, default all
  const cbs = Array.from(document.querySelectorAll('.level:checked'));
  if(cbs.length===0) return ["A1","A2","B1","B2"];
  return cbs.map(cb=>cb.value).filter(v=>["A1","A2","B1","B2"].includes(v));
}

async function loadWordsForSelectedLevels(){
  const levels = getSelectedLevels();
  const results = [];
  for(const lvl of levels){
    const url = `${lvl}.json`;
    try{
      const res = await fetch(url);
      if(!res.ok) throw new Error("HTTP "+res.status);
      const data = await res.json();
      // normalize: allow either array or {words:[...]}
      const arr = Array.isArray(data) ? data : (Array.isArray(data.words) ? data.words : []);
      for(const w of arr){
        if(!w.level) w.level = lvl;
        results.push(w);
      }
    }catch(e){
      console.log(url+" yok veya okunamadı", e);
    }
  }
  words = results;
  loadUnits();
}

loadWordsForSelectedLevels();

document.querySelectorAll('.level').forEach(cb=>{
  cb.addEventListener('change', ()=>{
    loadWordsForSelectedLevels();
    document.getElementById("quizOutput").innerHTML = "";
  });
});


function loadStudents(){

let grade=document.getElementById("grade").value
let list=document.getElementById("studentList")
list.innerHTML=""

students
.filter(s=>s.Sube.startsWith(grade))
.forEach(s=>{

let div=document.createElement("div")
div.className="studentItem"

div.innerHTML=`
<label>
<input type="checkbox" value="${s.Adi}">
${s.Adi}
</label>
`

list.appendChild(div)

})

}

document.getElementById("grade").addEventListener("change",loadStudents)

function loadUnits(){

let unitSet=new Set()

words.forEach(w=>{
if(w.unit) unitSet.add(w.unit)
})

let container=document.getElementById("unitList")
container.innerHTML = ""
unitSet.forEach(u=>{

let div=document.createElement("div")

div.innerHTML=`
<label>
<input type="checkbox" value="${u}" class="unit">
${u}
</label>
`

container.appendChild(div)

})

}

function getWordPool(){

let grade=document.getElementById("grade").value

let levels=[...document.querySelectorAll(".level:checked")].map(x=>x.value)
let units=[...document.querySelectorAll(".unit:checked")].map(x=>x.value)

let pool=words.filter(w=>{

if(w.grade && w.grade!=grade) return false

if(levels.length && !levels.includes(w.level)) return false

if(units.length && !units.includes(w.unit)) return false

return true

})

return pool

}

function shuffle(arr){
return arr.sort(()=>Math.random()-0.5)
}

function createQuiz(){

let selectedStudents=[...document.querySelectorAll("#studentList input:checked")]
.map(x=>x.value)

let manual=document.getElementById("manualWords").value.trim()

let manualWords=[]

if(manual){

manual.split("\\n").forEach(line=>{

let p=line.split("\\t")

manualWords.push({en:p[0],tr:p[1]})

})

}

let pool=getWordPool()

pool=[...pool,...manualWords]

pool=shuffle(pool)

let count=parseInt(document.getElementById("questionCount").value)

let output=document.getElementById("quizOutput")
output.innerHTML=""

selectedStudents.forEach((student,i)=>{

let usedKey="used_"+student
let used=JSON.parse(localStorage.getItem(usedKey) || "[]")

let page=document.createElement("div")
page.className="quizPage"

let header=`
<div class="quizHeader">
<b>ALTINKÜRE YABANCI DİLLER KOORDİNATÖRLÜĞÜ</b><br>
Quiz No: ${Date.now()}-${i+1}<br>
Öğrenci: ${student}<br>
Tarih: ${new Date().toLocaleDateString()}<br>
Sayfa: 1 / 1
</div>
`

let questions=""
let q=0
let newUsed=[...used]

for(let w of pool){

let id=w.en

if(document.getElementById("preventRepeat").checked){
if(used.includes(id)) continue
}

questions+=`
<div class="question">
${q+1}) ${w.en} ______________________________
</div>
`

newUsed.push(id)

q++

if(q>=count) break

}

localStorage.setItem(usedKey,JSON.stringify(newUsed))

page.innerHTML=header+questions

output.appendChild(page)

})

}

</script>

</body>
</html>
